name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site-path: _site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare static site for GitHub Pages
        run: |
          set -e
          rm -rf _site
          mkdir -p _site/assets
          # Copy built client assets
          if [ -d "dist/client/assets" ]; then
            cp -r dist/client/assets/* _site/assets/
          fi

          # Generate a minimal index.html that loads the client assets
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Sidharth Varma Gurijala — Software Engineer</title>
          HTML

          # Insert CSS links if present
          for css in _site/assets/*.css; do
            [ -f "$css" ] || continue
            echo "  <link rel=\"stylesheet\" href=\"assets/$(basename "$css")\">" >> _site/index.html
          done

          cat >> _site/index.html <<'HTML'
            </head>
            <body>
              <div id="root"></div>
          HTML

          # Insert module scripts for JS assets
          for js in _site/assets/*.js; do
            [ -f "$js" ] || continue
            echo "  <script type=\"module\" src=\"assets/$(basename "$js")\"></script>" >> _site/index.html
          done

          cat >> _site/index.html <<'HTML'
            </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
